name: Feature Task
description: Track one implementation-ready product or technical task.
title: "[Task] "
body:
  - type: markdown
    attributes:
      value: |
        Review [`CONTRIBUTING.md`](https://github.com/TeamLith/lith/blob/main/CONTRIBUTING.md) before opening tracked work. Keep one issue scoped to one branch and one PR.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Goal
      description: What should be implemented or improved?
      placeholder: Describe the user-visible or technical goal.
    validations:
      required: true
  - type: textarea
    id: input_specs
    attributes:
      label: Input Specs
      description: List the repo docs or specs that define the work.
      placeholder: |
        - FEATURE_TEXT_NOTES.md
        - ARCHITECTURE.md
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What outputs are expected?
      placeholder: |
        - UI screen
        - Tests
    validations:
      required: true
  - type: textarea
    id: user_docs_impact
    attributes:
      label: User-Facing Documentation Impact
      description: If this changes user-visible behavior, onboarding, settings, or adds a feature, describe which page under `Docs/site` must be updated in the same issue.
      placeholder: |
        - Update `Docs/site/notes-and-links.md` for a note creation flow change
        - No user-facing docs change; internal refactor only
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope / Non-goals
      description: Optional guardrails for what this issue should not expand into.
      placeholder: |
        - No platform-specific redesign
        - Do not change sync behavior
  - type: textarea
    id: implementation_steps
    attributes:
      label: Suggested Steps
      description: Optional decomposition into concrete subtasks.
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3
  - type: input
    id: dependencies
    attributes:
      label: Dependencies
      description: Other issue numbers, specs, or prerequisites.
      placeholder: "#123, project.yml update, FEATURE_SEARCH_GRAPH.md"
  - type: textarea
    id: validation
    attributes:
      label: Validation Expectations
      description: Builds, tests, doc checks, or manual checks required before close-out. Use `scripts/validate.sh` when app wiring or repo workflow changes.
      placeholder: |
        - swift test
        - update the matching page under `Docs/site` if behavior changed
        - scripts/validate.sh
  - type: textarea
    id: notes
    attributes:
      label: Notes / Blockers
      description: Constraints, decisions, or known risks.
