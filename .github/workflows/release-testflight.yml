name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which app to release"
        required: true
        type: choice
        options:
          - ios
          - macos
          - both
        default: both
      internal_only:
        description: "Restrict this upload to internal TestFlight testers only"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release_ios:
    name: Release (ios)
    runs-on: macos-15
    if: ${{ github.event.inputs.platform == 'both' || github.event.inputs.platform == 'ios' }}
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SCHEME: NativeNotesiOS
      DESTINATION: generic/platform=iOS
      ARCHIVE_NAME: LithiOS
      ASSET_GLOB: "*.ipa"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for var in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done

      - name: Install App Store Connect API key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf "%s" "$ASC_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/${ARCHIVE_NAME}.xcarchive"
          set +e
          xcodebuild \
            -workspace NativeNotes.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "$DESTINATION" \
            -archivePath "$archive_path" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            clean archive 2>&1 | tee "$RUNNER_TEMP/archive-${ARCHIVE_NAME}.log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Archive failed with status $status. Key diagnostics:"
            grep -E "error:|No signing|provision|profile|certificate|Authentication|team|bundle identifier|CodeSign" "$RUNNER_TEMP/archive-${ARCHIVE_NAME}.log" | tail -n 120 || true
            exit "$status"
          fi
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Export build
        run: |
          set -euo pipefail
          export_dir="$RUNNER_TEMP/export-ios"
          mkdir -p "$export_dir"

          if [ "${{ github.event.inputs.internal_only }}" = "true" ]; then
            tf_internal_tag="<true/>"
          else
            tf_internal_tag="<false/>"
          fi

          cat > "$RUNNER_TEMP/exportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>testFlightInternalTestingOnly</key>
            ${tf_internal_tag}
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$export_dir" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          asset_path="$(find "$export_dir" -maxdepth 1 -name "$ASSET_GLOB" -print -quit)"
          if [ -z "$asset_path" ]; then
            echo "No export artifact found matching $ASSET_GLOB in $export_dir" >&2
            ls -la "$export_dir"
            exit 1
          fi

          echo "ASSET_PATH=$asset_path" >> "$GITHUB_ENV"

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lith-iOS-release
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          xcrun iTMSTransporter \
            -m upload \
            -assetFile "$ASSET_PATH" \
            -apiKey "$ASC_KEY_ID" \
            -apiIssuer "$ASC_ISSUER_ID" \
            -v informational

  release_macos:
    name: Release (macos)
    runs-on: macos-15
    if: ${{ github.event.inputs.platform == 'both' || github.event.inputs.platform == 'macos' }}
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      SCHEME: NativeNotesmacOS
      DESTINATION: generic/platform=macOS
      ARCHIVE_NAME: LithmacOS
      ASSET_GLOB: "*.pkg"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for var in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done

      - name: Install App Store Connect API key
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf "%s" "$ASC_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/${ARCHIVE_NAME}.xcarchive"
          set +e
          xcodebuild \
            -workspace NativeNotes.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "$DESTINATION" \
            -archivePath "$archive_path" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            clean archive 2>&1 | tee "$RUNNER_TEMP/archive-${ARCHIVE_NAME}.log"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "Archive failed with status $status. Key diagnostics:"
            grep -E "error:|No signing|provision|profile|certificate|Authentication|team|bundle identifier|CodeSign" "$RUNNER_TEMP/archive-${ARCHIVE_NAME}.log" | tail -n 120 || true
            exit "$status"
          fi
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Export build
        run: |
          set -euo pipefail
          export_dir="$RUNNER_TEMP/export-macos"
          mkdir -p "$export_dir"

          if [ "${{ github.event.inputs.internal_only }}" = "true" ]; then
            tf_internal_tag="<true/>"
          else
            tf_internal_tag="<false/>"
          fi

          cat > "$RUNNER_TEMP/exportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>testFlightInternalTestingOnly</key>
            ${tf_internal_tag}
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$export_dir" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          asset_path="$(find "$export_dir" -maxdepth 1 -name "$ASSET_GLOB" -print -quit)"
          if [ -z "$asset_path" ]; then
            echo "No export artifact found matching $ASSET_GLOB in $export_dir" >&2
            ls -la "$export_dir"
            exit 1
          fi

          echo "ASSET_PATH=$asset_path" >> "$GITHUB_ENV"

      - name: Upload export artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lith-macOS-release
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          xcrun iTMSTransporter \
            -m upload \
            -assetFile "$ASSET_PATH" \
            -apiKey "$ASC_KEY_ID" \
            -apiIssuer "$ASC_ISSUER_ID" \
            -v informational
