name: LithApps
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
packages:
  Lith:
    path: .
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  LithiOS:
    type: application
    platform: iOS
    sources:
      - Apps/LithApp/Sources/Shared
      - Apps/LithApp/Sources/iOS
      - Apps/LithApp/Resources
    dependencies:
      - package: Lith
        product: Lith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.lith.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lith
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
  LithmacOS:
    type: application
    platform: macOS
    sources:
      - Apps/LithApp/Sources/Shared
      - Apps/LithApp/Sources/macOS
      - Apps/LithApp/Resources
    dependencies:
      - package: Lith
        product: Lith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.lith.macos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Lith
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
schemes:
  LithiOS:
    shared: true
    build:
      targets:
        LithiOS: all
    run:
      config: Debug
    archive:
      config: Release
  LithmacOS:
    shared: true
    build:
      targets:
        LithmacOS: all
    run:
      config: Debug
    archive:
      config: Release
